version: "3.8"

services:
  inkyra-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inkyra-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inkyra-web.rule=Host(`inkyra.yourdomain.com`)"
      - "traefik.http.routers.inkyra-web.entrypoints=websecure"
      - "traefik.http.routers.inkyra-web.tls.certresolver=letsencrypt"
    networks:
      - proxy

networks:
  proxy:
    external: true
